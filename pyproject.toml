[project]
name = "aqmodels"
dynamic = ["version", "description", "readme"]
authors = [
    { name = "Jonas Blenninger", email = "jonas.blenninger@aqarios.com" },
    { name = "David Bucher", email = "david.bucher@aqarios.com" }
    { name = "Benjamin Suehling", email = "benjamin.suehling@aqarios.com" }
]
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.2.2",
]

[tool.uv]
package = true
cache-keys = [
    { file = "pyproject.toml" },
    { file = "Cargo.toml" },
    { file = "**/*.rs" },
    { file = "src/aqmodels/**/*.pyi" },
    { file = "src/aqmodels/**/*.py" },
]

[tool.pytest.ini_options]
markers = [
    "variable",
    "expression",
    "model",
    "constraint",
    "str_repr",
    "translator",
    "imports"
]

[tool.maturin]
module-name = "aqmodels._core"
python-packages = ["aqmodels"]
python-source = "src"
features = ["py"]
include = [
  "src/aqmodels/**/*.pyi", 
  "src/aqmodels/**/*.py", 
  "src/aqmodels/py.typed",
]

[build-system]
requires = [ "maturin>=1.0,<2.0" ]
build-backend = "maturin"

[dependency-groups]
dev = [
    "colorama>=0.4.6",
    "memray>=1.15.0",
    "pytest>=8.3.4",
    "ruff>=0.9.9",
    "rich>=13.9.4",
    "tabulate>=0.9.0",
    "tqdm>=4.67.1",
    "scipy>=1.15.2",
    "memory-profiler>=0.61.0",
    "dimod>=0.12.18",
]
