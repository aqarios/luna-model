[project]
name = "aq-models"
dynamic = ["version"]
description = "Rust based implementation of aq-models"
readme = "README.md"
authors = [
    { name = "Jonas Blenninger", email = "jonas.blenninger@aqarios.com" },
    { name = "David Bucher", email = "david.bucher@aqarios.com" }
]
requires-python = ">=3.11"
dependencies = [
    "dimod>=0.12.18",
    "memory-profiler>=0.61.0",
    "numpy>=2.2.2",
    "scipy>=1.15.1",
]

[project.scripts]
# aq-models = "aq_models:main"

[tool.uv]
package = true
cache-keys = [
    { file = "pyproject.toml" },
    { file = "Cargo.toml" },
    { file = "**/*.rs" },
]

[tool.pytest.ini_options]
markers = [
    "variable",
    "expression",
    "model",
    "constraint",
    "str_repr"
]

[tool.maturin]
module-name = "aq_models._core"
python-packages = ["aq_models"]
python-source = "src"
features = ["py"]

[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[dependency-groups]
dev = [
    "colorama>=0.4.6",
    "memray>=1.15.0",
    "pytest>=8.3.4",
    "ruff>=0.9.9",
    "rich>=13.9.4",
    "tabulate>=0.9.0",
    "tqdm>=4.67.1",
]
