# cargo-about configuration for generating THIRD_PARTY_LICENSES.txt.
#
# `accepted` is a hard allow-list of SPDX licenses: cargo-about fails if any
# bundled dependency carries a license that cannot be satisfied from this list.
# That failure is the point — a new dependency with an unvetted (or copyleft)
# license blocks the release until a human reviews it, so the shipped notice can
# never silently fall out of legal compliance.
#
# Generation is driven by ci/tools/generate-third-party-licenses.sh, which runs
# cargo-about once per distributed artifact (the pylm wheel and the js-lunamodel
# npm package) so each notice reflects exactly that artifact's dependency tree.

# Order is the order licenses are preferred when a crate offers a choice
# (e.g. "MIT OR Apache-2.0" resolves to MIT — fewer obligations, one text).
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    "MPL-2.0",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
]

# Skip first-party workspace crates (path deps / publish = false): they are our
# own Apache-2.0 code and need no third-party attribution.
[private]
ignore = true
