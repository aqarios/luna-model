[package]
name = "aqmodels"
version = "0.1.5-rc6"
edition = "2021"
description = "Rust based implementation of aq-models"
readme = "README.md"
license = "Copyright"
homepage = "https://github.com/aqarios/aq-models-rs"
exclude = [
    "pytests",
    "bench_reports",
    "benchmarks"
]

# [lib]
# name = "_core"
# # # "cdylib" is necessary to produce a shared library for Python to import from.
# crate-type = ["cdylib"]

[dependencies]
derive_more = { version = "2.0.1", features = ["deref", "deref_mut"] }
global_counter = "0.2.2"
hashbrown = "0.15.2"
nohash = "0.2.0"
num = "0.4.3"
once_cell = "1.21.3"
rand = "0.9.0"
rustc-hash = "2.1.1"
prost = "0.13.5"
strum = "0.27.1"
strum_macros = "0.27.1"
zstd = "0.13.3"
either = "1.15.0"
regex = "1.11.1"
time = { version = "0.3.41", features = ["formatting"] }
itertools = "0.14.0"
indexmap = "2.9.0"
[dependencies.pyo3]
version = "0.24.1"
features = ["extension-module", "indexmap"]
optional = true

[dependencies.numpy]
version = "0.24.0"
optional = true

[dependencies.aqm-macros]
path = "aqm-macros"
features = [ "py" ]
optional = true

[features]
py = ["pyo3", "numpy", "aqm-macros"]
lq = ["py"]
transformations = []
