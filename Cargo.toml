[package]
name = "aqmodels"
version = "0.2.4-dev393"
edition = "2021"
description = "Rust based implementation of aq-models"
readme = "README.md"
license = "Copyright"
homepage = "https://github.com/aqarios/aq-models-rs"
exclude = [
    "pytests",
    "bench_reports",
    "benchmarks"
]

# [lib]
# name = "_core"
# # # "cdylib" is necessary to produce a shared library for Python to import from.
# crate-type = ["cdylib"]

[dependencies]
derive_more = { version = "2.0.1", features = ["deref", "deref_mut"] }
global_counter = "0.2.2"
hashbrown = "0.16.0"
nohash = "0.2.0"
num = "0.4.3"
once_cell = "1.21.3"
rand = "0.9.2"
rustc-hash = "2.1.1"
prost = "0.14.1"
strum = "0.27.2"
strum_macros = "0.27.2"
zstd = "0.13.3"
either = "1.15.0"
regex = "1.12.2"
time = { version = "0.3.44", features = ["formatting"] }
itertools = "0.14.0"
indexmap = "2.11.4"
dyn-clone = "1.0.19"
pad = "0.1.6"
sqids = "0.4.2"
bitvec = "1.0.1"
[dependencies.pyo3]
version = "0.26.0"
features = ["extension-module", "indexmap", "generate-import-lib"]
optional = true

[dependencies.numpy]
version = "0.26.0"
optional = true

[dependencies.aqm-macros]
path = "aqm-macros"
default-features = false
optional = true

[dependencies.unwind-macros]
path = "unwind-macros"
optional = true

[features]
py = ["pyo3", "numpy", "unwind-macros"]
transformations = ["aqm-macros"]
pyt = ["py", "aqm-macros/py", "transformations"]
lq = ["py", "pyt"]
