[package]
name = "aqmodels"
version = "0.1.0"
edition = "2021"

# [lib]
# name = "aqmodels"
# # "cdylib" is necessary to produce a shared library for Python to import from.
# crate-type = ["cdylib"]

[dependencies]
derive_more = { version = "2.0.1", features = ["deref", "deref_mut"] }
global_counter = "0.2.2"
hashbrown = "0.15.2"
nohash = "0.2.0"
num = "0.4.3"
once_cell = "1.20.2"
rand = "0.9.0"
rustc-hash = "2.1.1"
prost = "0.13.5"
strum = "0.27.1"
strum_macros = "0.27.1"
zstd = "0.13.3"
# "extension-module" tells pyo3 we want to build an extension module (skips linking against libpython.so)
# "abi3-py39" tells pyo3 (and maturin) to build using the stable ABI with minimum Python version 3.9
# pyo3 = { version = "0.23.4", features = ["extension-module", "abi3-py39"] }
[dependencies.pyo3]
version = "0.23.4"
features = ["extension-module", "abi3-py311"]
optional = true

[dependencies.numpy]
version = "0.23.0"
optional = true

[features]
py = ["pyo3", "numpy"]
