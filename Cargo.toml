[workspace]
resolver = "3"
members = [
  "crates/*",
  "py-lunamodel/pylm",
  "pyo3-lunamodel",
]
default-members = [
  "crates/*",
]

[workspace.package]
version = "0.5.0"
authors = [
  "Jonas Blenninger <jonas.blenninger@aqarios.com>",
  "David Bucher <david.bucher@aqarios.com>",
]
edition = "2024"
description = "Aqarios LunaModel: Symbolic modeling for optimization"
homepage = "https://www.aqarios.com"
repository = "https://github.com/aqaiors/luna-model"

[workspace.dependencies]
global_counter = "0.2.2"
hashbrown = "0.16.0"
nohash = "0.2.0"
num = "0.4.3"
once_cell = "1.21.3"
rand = "0.9.2"
rustc-hash = "2.1.1"
prost = "0.14.1"
strum = "0.27.2"
strum_macros = "0.27.2"
zstd = "0.13.3"
either = "1.15.0"
regex = "1.12.2"
time = { version = "0.3.44", features = ["formatting"] }
itertools = "0.14.0"
indexmap = "2.12.0"
dyn-clone = "1.0.19"
pad = "0.1.6"
sqids = "0.4.2"
bitvec = "1.0.1"
enumset = "1.1.10"
pyo3 = "0.27.1"
numpy = "0.27.0"
syn = "2.0"
proc-macro2 = "1.0"
quote = "1.0"
derive_more = "2.0.1"
parking_lot = "0.12.5"

lunamodel = { version = "0.5.0", path = "crates/lunamodel", default-features = false }
lunamodel-types = { version = "0.5.0", path = "crates/types", default-features = false }
lunamodel-error = { version = "0.5.0", path = "crates/error", default-features = false }
lunamodel-core = { version = "0.5.0", path = "crates/core", default-features = false }
lunamodel-ops = { version = "0.5.0", path = "crates/ops", default-features = false }
lunamodel-io = { version = "0.5.0", path = "crates/io", default-features = false }
# lunamodel-hashing = { version = "0.5.0", path = "crates/hashing", default-features = false }
# lunamodel-unwind = { version = "0.5.0", path = "crates/unwind", default-features = false }
lunamodel-serializer = { version = "0.5.0", path = "crates/serializer", default-features = false }
lunamodel-transform = { version = "0.5.0", path = "crates/transform", default-features = false }
# lunamodel-tpass = { version = "0.5.0", path = "crates/tpass", default-features = false }
lunamodel-translate = { version = "0.5.0", path = "crates/translate", default-features = false }
lunamodel-python = { version = "0.5.0", path = "crates/python", default-features = false }
lunamodel-utils = { version = "0.5.0", path = "crates/utils", default-features = false }
