[mypy]
plugins = returns.contrib.mypy.returns_plugin, pydantic.mypy


follow_imports = silent
warn_redundant_casts = True
warn_unused_ignores = True
disallow_any_generics = True
no_implicit_reexport = True
disallow_untyped_defs = True


exclude = (?x)venv|local

strict = True


[pydantic-mypy]
init_forbid_extra = True
init_typed = True
warn_required_dynamic_aliases = True
warn_untyped_fields = True

[mypy-luna_bench._internal.entities.*]
# Allowing untyped calls here because peewee stubs are sadly not complete.
disallow_untyped_calls = False

[mypy-huey.*]
# Huey currently is untyped, and no official stubs exit.
ignore_missing_imports = True

[mypy-pyscipopt]
ignore_missing_imports = True
