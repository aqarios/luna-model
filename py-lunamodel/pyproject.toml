[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "luna_model"
readme = "README.md"
license = "Apache-2.0"
license-files = ["./LICENSE"]
dynamic = ["version", "description"]
authors = [
    { name = "Aqarios GmbH", email = "pypi@aqarios.com" },
]
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.0.0",
]
keywords = [
  "aqarios",
  "luna",
  "quantum computing",
  "quantum optimization",
  "optimization",
  "modeling"
]
# todo: check these values.
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Topic :: Scientific/Engineering",
]

[project.urls]
Homepage = "https://aqarios.com"
Documentation = "https://docs.aqarios.com"

[tool.maturin]
strip = true
manifest-path = "pylm/Cargo.toml"
module-name = "luna_model._lm"
python-packages = ["luna_model"]
python-source = "src"
all-features = false
no-default-features = true
include = [
    "src/luna_model/**/*.pyi",
    "src/luna_model/**/*.py",
    "src/luna_model/py.typed",
]
exclude = [
    "**/__pycache__",
     "**/*.pyc",
]

[tool.uv]
package = true
cache-keys = [
    { file = "Cargo.toml" },
    { file = "src/**/*.rs" },
    { file = "pyproject.toml" },
    { file = "src/luna_model/**/*.pyi" },
    { file = "src/luna_model/**/*.py" },
    { file = "../crates/**/*.rs" },
]
