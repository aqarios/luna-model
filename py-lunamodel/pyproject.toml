[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "luna_model"
readme = "README.md"
license = "Apache-2.0"
license-files = ["./LICENSE"]
dynamic = ["version", "description"]
authors = [
    { name = "Aqarios GmbH", email = "pypi@aqarios.com" },
]
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.0.0",
]
keywords = [
  "aqarios",
  "luna",
  "quantum computing",
  "quantum optimization",
  "optimization",
  "modeling"
]
# todo: check these values.
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Topic :: Scientific/Engineering",
]

[project.optional-dependencies]
dimod = [
    "dimod>=0.12.21",
]
qiskit = [
    "qiskit-optimization>=0.6.1; python_version < '3.14'",
    "qiskit>=2.1.2; python_version < '3.14'",
]
scip = [
    "pyscipopt>=6.0.0",
]

[project.urls]
Homepage = "https://aqarios.com"
Documentation = "https://docs.aqarios.com"

[tool.maturin]
strip = true
manifest-path = "pylm/Cargo.toml"
module-name = "luna_model._lm"
python-packages = ["luna_model"]
python-source = "src"
all-features = false
no-default-features = true
include = [
    "src/luna_model/**/*.pyi",
    "src/luna_model/**/*.py",
    "src/luna_model/py.typed",
]
exclude = [
    "**/__pycache__",
     "**/*.pyc",
]

[tool.uv]
package = true
cache-keys = [
    { file = "Cargo.toml" },
    { file = "src/**/*.rs" },
    { file = "pyproject.toml" },
    { file = "src/luna_model/**/*.pyi" },
    { file = "src/luna_model/**/*.py" },
    { file = "../crates/**/*.rs" },
]

[dependency-groups]
dev = [
    "dimod>=0.12.21",
    "docplex>=2.30.251",
    "gurobipy>=13.0.0",
    "ipython>=9.8.0",
    "numpy>=2.3.5",
    "pyscipopt>=6.0.0",
    "pytest>=9.0.2",
    "qiskit[all]>=2.1.2; python_version < '3.14'",
    "qiskit-aer>=0.17.1; python_version < '3.14'",
    "qiskit-ibm-runtime>=0.41.1; python_version < '3.14'",
    "qiskit-optimization>=0.6.1; python_version < '3.14'",
    "scipy>=1.16.3",
    "rich>=14.2.0",
    "ruff>=0.14.14",
    "mypy>=1.19.1",
]
docs = [
    "mkdocstrings[python]>=1.0.1",
    "zensical>=0.0.17",
]

[tool.mypy]
exclude = [".venv", "tests", "docs"]
disable_error_code = "import-untyped"

[[tool.mypy.overrides]]
module = [
    "luna_model._lm",
    "luna_model._lm.*",
]
disable_error_code = "import-not-found"
