# Dependabot configuration.
#
# One PR per ecosystem: each ecosystem has a catch-all version-updates group
# (no update-types filter, so majors are included) plus a matching
# security-updates group — without the latter, security fixes would still
# arrive as individual PRs.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        applies-to: version-updates
        patterns:
          - "*"
      actions-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo:
        applies-to: version-updates
        patterns:
          - "*"
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/py-lunamodel"
    schedule:
      interval: "weekly"
    exclude-paths:
      - "THIRD_PARTY_LICENSES.txt"
    groups:
      python:
        applies-to: version-updates
        patterns:
          - "*"
      python-security:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: "bun"
    directory: "/js-lunamodel"
    schedule:
      interval: "weekly"
    groups:
      javascript:
        applies-to: version-updates
        patterns:
          - "*"
      javascript-security:
        applies-to: security-updates
        patterns:
          - "*"
