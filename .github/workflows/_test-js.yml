# Reusable: js-lunamodel checks. `bun run test:all` covers cargo check,
# cargo test -p js-lunamodel, a debug napi build, and the bun test suite.
name: Test JS

on:
  workflow_call:
    inputs:
      working-directory:
        required: false
        type: string
        default: 'js-lunamodel'

env:
  CARGO_INCREMENTAL: "0"

jobs:
  test:
    name: bun test:all
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Read Rust toolchain channel
        id: toolchain
        run: |
          channel=$(sed -n 's/^channel = "\(.*\)"/\1/p' "$GITHUB_WORKSPACE/rust-toolchain.toml")
          test -n "$channel"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Run checks and tests
        run: bun run test:all
