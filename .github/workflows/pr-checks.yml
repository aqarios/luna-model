# PR validation. Fans out to the vendored reusable workflows based on which
# paths changed, and funnels everything into a single `PR Checks` summary job
# (use that one job as the required status check in branch protection).
#
# Public-repo safety rules baked in here:
#   - no job uses secrets, so everything also runs on PRs from forks
#   - top-level permissions are read-only
name: PR Checks

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      js: ${{ steps.filter.outputs.js }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v4.0.1
        with:
          filters: |
            shared: &shared
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.cargo/**'
              - 'ci/**'
              - '.github/workflows/**'
            rust:
              - *shared
              - 'pyo3-lunamodel/**'
            python:
              - *shared
              - 'py-lunamodel/**'
            js:
              - *shared
              - 'js-lunamodel/**'

  check-versions:
    name: Check version sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Verify all versions match the workspace version
        run: sh ci/tools/check-versions.sh

  lint-rust:
    name: Lint Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.js == 'true'
    uses: ./.github/workflows/_lint-rust.yml

  test-rust:
    name: Test Rust
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.js == 'true'
    uses: ./.github/workflows/_test-rust.yml

  lint-python:
    name: Lint Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    uses: ./.github/workflows/_lint-python.yml

  test-python:
    name: Test Python
    needs: changes
    if: needs.changes.outputs.python == 'true'
    uses: ./.github/workflows/_test-python.yml

  test-js:
    name: Test JS
    needs: changes
    if: needs.changes.outputs.js == 'true'
    uses: ./.github/workflows/_test-js.yml

  summary:
    name: PR Checks
    runs-on: ubuntu-latest
    needs:
      - changes
      - check-versions
      - lint-rust
      - test-rust
      - lint-python
      - test-python
      - test-js
    if: always()
    steps:
      - name: Verify all checks succeeded or were skipped
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          failed=$(echo "$RESULTS" | jq -r 'to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | "\(.key): \(.value.result)"')
          if [ -n "$failed" ]; then
            echo "❌ failed checks:"
            echo "$failed"
            exit 1
          fi
          echo "✅ all checks passed or were skipped"
