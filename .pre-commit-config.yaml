# Run `pre-commit install` to enable pre-commit hooks after cloning the project.
# Thereafter, pre-commit will run automatically on `git commit`.

repos:
  # optional basic config generated using `pre-commit sample-config`
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  # ruff config from ruff docs: https://docs.astral.sh/ruff/integrations/#pre-commit
  - repo: local
    hooks:
      # Run the linter.
      - id: ruff-private
        name: ruff-private
        entry: bash -c "cd private && uv run ruff check . --config ../ruff.toml"
        language: system
        pass_filenames: false
        always_run: true
      # Run the formatter.
      - id: ruff-format-private
        name: ruff-format-private
        entry: bash -c "cd private && ruff format . --config ../ruff.toml"
        language: system
        pass_filenames: false
        always_run: true
      # Run the linter.
      - id: ruff-public
        name: ruff-public
        entry: bash -c "cd public && uv run ruff check . --config ../ruff.toml"
        language: system
        pass_filenames: false
        always_run: true
      # Run the formatter.
      - id: ruff-format-public
        name: ruff-format-public
        entry: bash -c "cd public && ruff format . --config ../ruff.toml"
        language: system
        pass_filenames: false
        always_run: true
