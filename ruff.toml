exclude = [
    ".venv",
]

target-version = "py312"

[lint]
select = [
    "F",
    "E",
    "W",
    "C90",
    "I",
    "N",
    "D",
    "UP",
    "ANN",
    "ASYNC",
    "S",
    "FBT",
    "B",
    "A",
    "COM",
    "C4",
    "DTZ",
    "T10",
    "FA",
    "ISC",
    "ICN",
    "INP",
    "PIE",
    "T20",
    "PYI",
    "PT",
    "Q",
    "RSE",
    "RET",
    "SLF",
    "SLOT",
    "SIM",
    "TID",
    "TCH",
    "ARG",
    "TD",
    "FIX",
    "ERA",
    "PGH",
    "PL",
    "TRY",
    "FLY",
    "NPY",
    "PERF",
    "RUF",
]
ignore = [
    "BLE001", # To catch all exception might be useful when we don't own a lib or code

    "COM812", # conflicts when used with the formatter
    "ISC001", # conflicts when used with the formatter

    # "D100", #Missing docstring in public module - every file would require a docstring at the top
    "D104", #Missing docstring in public package - every __init__.py would require a docstring at the top
    "TD003", # Link for TODO comments
]
# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []
exclude = [
    "src/aqmodels/__init__.py",
    "src/aqmodels/__init__.pyi",
    # "src/aqmodels/_core.pyi",
    # "src/aqmodels/errors.pyi",
    "pytests/**/*",
]

[lint.flake8-annotations]
allow-star-arg-any = true # At some point we should remove all args and kwargs


[lint.extend-per-file-ignores]
"pytests/*" = [
    "D101", #Doc-Strings - Missing docstring in public class
    "D102", #Doc-Strings - Missing docstring in public method
    "D103", #Doc-Strings - Missing docstring in public function
    "S",
    "SLF",
    "PL"]
"src/aqmodels/**/*" = ["PYI021", "PIE790", "PYI048", "PYI029", "PYI041"] # Hard to fix. We need to do that at some point.
# "aqmodels/client/*" = ["ANN401","D101", "D102","D103", "D105", "D205", "D401","D404", "TC001", "TC003", "PLR0913"] # Hard to fix. We need to fix that for automatic docs
# "example/*" = ["D103", "S106", "ANN001", "S311"]

[lint.pydocstyle]
convention = "numpy"

[format]
# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
docstring-code-format = true

line-ending = "lf" # unix file endings > windows stuff

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"

[lint.flake8-pytest-style]
fixture-parentheses = true
mark-parentheses = true

[lint.flake8-tidy-imports]
# Bans imports that reach up to parent directories (using the `..` notation).
ban-relative-imports = "parents"

